[server]
headless = true
enableCORS = false
enableXsrfProtection = false
port = 8501
runOnSave = false

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
base = "dark"
primaryColor = "#d4af37"
backgroundColor = "#0b0f19"
secondaryBackgroundColor = "#111827"
textColor = "#e6edf3"
font = "sans serif"

[client]
showSidebarNavigation = false
toolbarMode = "minimal"
